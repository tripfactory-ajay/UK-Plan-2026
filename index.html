<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORN Group — European HQ</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1a4fa0;
    --navy-dark: #0f3070;
    --navy-deep: #081d45;
    --white: #ffffff;
    --off-white: #f4f6fb;
    --border: #dde3f0;
    --text: #1a1f36;
    --text-muted: #6b7280;
    --panel-width: 540px;
    --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--navy-deep);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* ── BACKGROUND ── */
  .bg-grid {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none; z-index: 0;
  }
  .bg-glow {
    position: fixed; width: 700px; height: 700px; border-radius: 50%;
    background: radial-gradient(circle, rgba(26,79,160,0.3) 0%, transparent 70%);
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    pointer-events: none; z-index: 0;
    animation: pulse-glow 4s ease-in-out infinite alternate;
  }
  @keyframes pulse-glow {
    from { transform: translate(-50%, -50%) scale(1); opacity: 0.7; }
    to   { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
  }

  /* ── WHITE HEADER ── */
  header {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px;
    height: 58px;
    background: var(--white);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 1px 8px rgba(0,0,0,0.07);
  }
  .logo-area {
    display: flex; align-items: center; gap: 14px;
  }
  .logo-img {
    height: 34px; object-fit: contain;
    display: block;
  }
  .logo-fallback {
    height: 34px; width: 80px;
    background: var(--navy);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 800; color: white;
    letter-spacing: 1px;
  }
  .header-sep { width: 1px; height: 26px; background: var(--border); }
  .header-title { font-size: 14px; font-weight: 700; color: var(--text); letter-spacing: -0.2px; }
  .header-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .header-meta {
    display: flex; gap: 24px; align-items: center;
  }
  .meta-item {
    text-align: right;
  }
  .meta-val { font-size: 13px; font-weight: 700; color: var(--navy); line-height: 1; }
  .meta-lbl { font-size: 10px; color: var(--text-muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.06em; }

  /* ── CANVAS ── */
  #canvas {
    position: fixed; inset: 0;
    top: 58px;
    z-index: 1;
    display: flex; align-items: center; justify-content: center;
    transition: transform var(--transition);
  }
  #canvas.panel-open {
    transform: translateX(calc(var(--panel-width) / -2));
  }

  /* ── DIAGRAM ── */
  #diagram {
    width: 840px; height: 840px;
    max-width: calc(100vw - 40px);
    max-height: calc(100vh - 78px);
    position: relative;
  }

  /* ── HUB ── */
  .hub {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 130px; height: 130px; border-radius: 50%;
    background: var(--white);
    border: 3px solid rgba(26,79,160,0.3);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: default; z-index: 10;
    box-shadow: 0 0 0 8px rgba(255,255,255,0.06), 0 0 50px rgba(26,79,160,0.5), 0 0 100px rgba(26,79,160,0.2);
    animation: hub-breathe 3s ease-in-out infinite alternate;
  }
  @keyframes hub-breathe {
    from { box-shadow: 0 0 0 8px rgba(255,255,255,0.06), 0 0 40px rgba(26,79,160,0.4), 0 0 80px rgba(26,79,160,0.15); }
    to   { box-shadow: 0 0 0 8px rgba(255,255,255,0.1),  0 0 60px rgba(26,79,160,0.65), 0 0 120px rgba(26,79,160,0.3); }
  }
  .hub-logo {
    width: 72px; height: 42px; object-fit: contain;
    display: block;
  }
  .hub-logo-fallback {
    font-size: 11px; font-weight: 800; color: var(--navy);
    letter-spacing: 1.5px; text-align: center; line-height: 1.2;
  }
  .hub-label {
    font-size: 9.5px; font-weight: 700; color: var(--navy);
    letter-spacing: 0.06em; text-transform: uppercase;
    text-align: center; line-height: 1.3; margin-top: 4px;
  }

  /* ── SVG SPOKES ── */
  #spokes-svg {
    position: absolute; inset: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 5;
  }
  .spoke-line {
    stroke: rgba(255,255,255,0.1); stroke-width: 1.5; fill: none;
    transition: stroke 0.3s, stroke-width 0.3s;
  }
  .spoke-line.active { stroke: rgba(255,255,255,0.45); stroke-width: 2.5; }

  /* ── DEPT NODES ── */
  .dept-node {
    position: absolute; transform: translate(-50%, -50%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer; z-index: 10;
    transition: transform 0.2s ease;
  }
  .dept-node:hover { transform: translate(-50%, -50%) scale(1.08); }
  .dept-node.active { transform: translate(-50%, -50%) scale(1.12); }
  .dept-circle {
    width: 66px; height: 66px; border-radius: 50%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    border: 2px solid rgba(255,255,255,0.18);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    transition: box-shadow 0.2s, border-color 0.2s;
  }
  .dept-node:hover .dept-circle,
  .dept-node.active .dept-circle {
    border-color: rgba(255,255,255,0.55);
    box-shadow: 0 6px 30px rgba(0,0,0,0.5), 0 0 20px rgba(255,255,255,0.1);
  }
  .dept-icon { font-size: 22px; line-height: 1; }
  .dept-label {
    position: absolute; font-size: 10px; font-weight: 600;
    color: rgba(255,255,255,0.88); white-space: nowrap;
    letter-spacing: 0.01em; text-shadow: 0 1px 4px rgba(0,0,0,0.7);
    pointer-events: none; text-align: center; max-width: 88px; line-height: 1.25;
  }

  /* ── SLIDE PANEL ── */
  #panel {
    position: fixed; top: 0; right: 0;
    width: var(--panel-width); height: 100vh;
    background: var(--white); z-index: 200;
    transform: translateX(100%);
    transition: transform var(--transition);
    display: flex; flex-direction: column;
    box-shadow: -8px 0 40px rgba(0,0,0,0.2);
    overflow: hidden;
  }
  #panel.open { transform: translateX(0); }

  .panel-header {
    padding: 20px 20px 16px; border-bottom: 1px solid var(--border);
    flex-shrink: 0; position: relative; background: var(--white);
  }
  .panel-dept-badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 4px 12px; border-radius: 20px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
    color: white; margin-bottom: 8px;
  }
  .panel-title { font-size: 19px; font-weight: 700; color: var(--text); line-height: 1.2; }
  .panel-close {
    position: absolute; top: 18px; right: 18px;
    width: 30px; height: 30px; border-radius: 8px;
    background: var(--off-white); border: 1px solid var(--border);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 15px; color: var(--text-muted);
    transition: background 0.15s, color 0.15s;
  }
  .panel-close:hover { background: var(--border); color: var(--text); }

  /* ── TABS ── */
  .panel-tabs {
    display: flex; border-bottom: 1px solid var(--border);
    flex-shrink: 0; background: var(--off-white);
  }
  .tab-btn {
    flex: 1; padding: 11px 6px;
    font-size: 11.5px; font-weight: 600; letter-spacing: 0.03em; text-transform: uppercase;
    color: var(--text-muted); background: none; border: none; cursor: pointer;
    border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s;
    font-family: 'Sora', sans-serif;
  }
  .tab-btn.active { color: var(--navy); border-bottom-color: var(--navy); }

  /* ── PANEL BODY ── */
  .panel-body {
    flex: 1; overflow-y: auto; padding: 18px;
    scroll-behavior: smooth;
  }
  .panel-body::-webkit-scrollbar { width: 4px; }
  .panel-body::-webkit-scrollbar-track { background: transparent; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  /* ── SECTION LABEL ── */
  .section-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px;
  }

  /* ── STAFF CARDS ── */
  .staff-card {
    background: var(--off-white); border: 1px solid var(--border);
    border-radius: 10px; margin-bottom: 8px; overflow: hidden;
  }
  .staff-card-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px; cursor: pointer; transition: background 0.15s;
    user-select: none;
  }
  .staff-card-header:hover { background: rgba(26,79,160,0.04); }
  .staff-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: white; flex-shrink: 0;
  }
  .staff-info { flex: 1; min-width: 0; }
  .staff-name { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.2; }
  .staff-role { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .staff-status {
    font-size: 10px; font-weight: 600; letter-spacing: 0.04em;
    padding: 3px 8px; border-radius: 20px; flex-shrink: 0;
  }
  .status-active { background: #d1fae5; color: #065f46; }
  .status-vacant { background: #fef3c7; color: #92400e; }
  .status-retained { background: #e0e7ff; color: #3730a3; }
  .staff-chevron { font-size: 10px; color: var(--text-muted); transition: transform 0.25s; flex-shrink: 0; }
  .staff-card.open .staff-chevron { transform: rotate(180deg); }

  .staff-responsibilities {
    max-height: 0; overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1);
    border-top: 0 solid var(--border);
  }
  .staff-card.open .staff-responsibilities { max-height: 700px; border-top-width: 1px; }
  .resp-inner { padding: 12px 14px; }
  .resp-item {
    display: flex; gap: 8px; align-items: flex-start;
    font-size: 11.5px; color: #374151; line-height: 1.5; margin-bottom: 5px;
  }
  .resp-item:last-child { margin-bottom: 0; }
  .resp-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--navy); margin-top: 6px; flex-shrink: 0; }
  .reports-to {
    font-size: 11px; color: var(--text-muted);
    padding: 7px 14px; border-top: 1px solid var(--border);
    background: rgba(26,79,160,0.03);
  }
  .salary-chip {
    font-size: 10px; font-family: 'JetBrains Mono', monospace;
    color: #059669; background: #d1fae5;
    padding: 2px 7px; border-radius: 4px; display: inline-block; margin-top: 3px;
  }
  .hire-chip {
    font-size: 10px; color: #9a3412; font-weight: 500; margin-top: 2px;
  }

  /* ── TASK ROWS ── */
  .task-row {
    display: grid;
    grid-template-columns: 44px 1fr 80px;
    gap: 8px; align-items: start;
    padding: 11px 0; border-bottom: 1px solid var(--border); font-size: 12px;
  }
  .task-row:last-child { border-bottom: none; }
  .task-id {
    font-family: 'JetBrains Mono', monospace; font-size: 9.5px; color: var(--text-muted);
    padding-top: 2px;
  }
  .task-content { min-width: 0; }
  .task-name { font-weight: 600; color: var(--text); font-size: 12.5px; margin-bottom: 3px; line-height: 1.3; }
  .task-desc { font-size: 11px; color: var(--text-muted); line-height: 1.4; margin-bottom: 3px; }
  .task-meta-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-top: 2px; }
  .task-owner { font-size: 10.5px; color: #374151; }
  .task-budget { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); }
  .task-controls { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; padding-top: 2px; }
  .priority-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; letter-spacing: 0.04em; }
  .p1 { background: #fee2e2; color: #991b1b; }
  .p2 { background: #fef3c7; color: #92400e; }
  .p3 { background: #d1fae5; color: #065f46; }
  .status-pill {
    display: flex; align-items: center; gap: 4px;
    cursor: pointer; padding: 2px 6px; border-radius: 20px;
    border: 1px solid var(--border); transition: background 0.15s;
  }
  .status-pill:hover { background: var(--off-white); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-pending { background: #9ca3af; }
  .dot-started { background: #f59e0b; }
  .dot-completed { background: #10b981; }
  .dot-negotiating { background: #6366f1; }
  .status-text { font-size: 9.5px; font-weight: 500; color: var(--text-muted); white-space: nowrap; }

  /* ── HINTS ── */
  .hint {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    font-size: 11px; color: rgba(255,255,255,0.35); letter-spacing: 0.06em;
    text-transform: uppercase; z-index: 1;
    font-family: 'JetBrains Mono', monospace;
    animation: hint-fade 3s ease 1.5s forwards; opacity: 0;
    animation-fill-mode: both;
  }
  @keyframes hint-fade {
    0%   { opacity: 0; transform: translateX(-50%) translateY(5px); }
    20%  { opacity: 1; transform: translateX(-50%) translateY(0); }
    80%  { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ── MOBILE ── */
  @media (max-width: 768px) {
    :root { --panel-width: 100vw; }
    #canvas.panel-open { transform: none; }
    #diagram { width: 96vw; height: 96vw; }
    .dept-circle { width: 52px; height: 52px; }
    .dept-icon { font-size: 17px; }
    .dept-label { font-size: 9px; max-width: 72px; }
    .hub { width: 100px; height: 100px; }
    header { padding: 0 16px; }
    .header-meta { display: none; }
  }

  /* ── ANIMATIONS ── */
  .dept-node { animation: node-appear 0.6s cubic-bezier(0.34,1.56,0.64,1) both; }
  @keyframes node-appear {
    from { opacity: 0; transform: translate(-50%,-50%) scale(0.4); }
    to   { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  }

  /* ── STATS BAR ── */
  .stats-bar {
    display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; padding: 10px 12px;
    background: var(--navy-deep); border-radius: 10px;
  }
  .stat-chip {
    font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px;
    background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8);
    font-family: 'JetBrains Mono', monospace;
  }
</style>
</head>

<!-- Slide Panel -->

<div class="hint">Click any department node to explore</div>

// ─── LAYOUT ───────────────────────────────────────────────────────────────────
const CX = 420, CY = 420;

const positions = [
  { angle: -90,   r: 285 }, // 0  Exec Board
  { angle: -62,   r: 295 }, // 1  Finance
  { angle: -34,   r: 300 }, // 2  Legal
  { angle: -6,    r: 295 }, // 3  Admin
  { angle:  22,   r: 290 }, // 4  Contracting
  { angle:  50,   r: 285 }, // 5  Sales
  { angle:  78,   r: 290 }, // 6  Marketing
  { angle: 106,   r: 295 }, // 7  Tech
  { angle: 134,   r: 300 }, // 8  Operations
  { angle: 162,   r: 295 }, // 9  Cruise
  { angle: 190,   r: 290 }, // 10 Agency
  { angle: 218,   r: 285 }, // 11 ORN App
  { angle: 246,   r: 285 }, // 12 Global Offices
];

function toRad(deg) { return deg * Math.PI / 180; }
function getPos(idx) {
  const p = positions[idx];
  return { x: CX + p.r * Math.cos(toRad(p.angle)), y: CY + p.r * Math.sin(toRad(p.angle)) };
}

// ─── BUILD DIAGRAM ─────────────────────────────────────────────────────────
function buildDiagram() {
  const diag = document.getElementById('diagram');
  const svg  = document.getElementById('spokes-svg');

  departments.forEach((dept, i) => {
    const pos = getPos(i);

    // Spoke line
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', CX); line.setAttribute('y1', CY);
    line.setAttribute('x2', pos.x); line.setAttribute('y2', pos.y);
    line.setAttribute('class', 'spoke-line');
    line.setAttribute('data-dept', dept.id);
    svg.appendChild(line);

    // Node
    const node = document.createElement('div');
    node.className = 'dept-node';
    node.style.left = pos.x + 'px';
    node.style.top = pos.y + 'px';
    node.style.animationDelay = (i * 55) + 'ms';
    node.setAttribute('data-id', dept.id);
    node.onclick = () => openPanel(dept.id);

    const angle = positions[i].angle;
    let labelStyle = '';
    if (angle > -120 && angle < -50) {
      labelStyle = `top:-46px; left:50%; transform:translateX(-50%)`;
    } else if (angle >= -50 && angle < 40) {
      labelStyle = `top:50%; left:74px; transform:translateY(-50%)`;
    } else if (angle >= 40 && angle < 150) {
      labelStyle = `top:74px; left:50%; transform:translateX(-50%)`;
    } else {
      labelStyle = `top:50%; right:74px; left:auto; transform:translateY(-50%); text-align:right`;
    }

    node.innerHTML = `
      <div class="dept-circle" style="background:${dept.color};">
        <div class="dept-icon">${dept.icon}</div>
      </div>
      <div class="dept-label" style="position:absolute;${labelStyle}">${dept.name}</div>
    `;
    diag.appendChild(node);
  });
}

// ─── PANEL STATE ─────────────────────────────────────────────────────────────
let currentDept = null;
const taskStatuses = {};

function openPanel(id) {
  currentDept = departments.find(d => d.id === id);
  if (!currentDept) return;

  document.querySelectorAll('.dept-node').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.spoke-line').forEach(l => l.classList.remove('active'));
  document.querySelector(`.dept-node[data-id="${id}"]`).classList.add('active');
  document.querySelector(`.spoke-line[data-dept="${id}"]`).classList.add('active');

  document.getElementById('panelBadge').style.background = currentDept.color;
  document.getElementById('panelBadge').textContent = currentDept.icon + ' ' + currentDept.name;
  document.getElementById('panelTitle').textContent = currentDept.name;

  switchToTab('staff');
  document.getElementById('panel').classList.add('open');
  document.getElementById('canvas').classList.add('panel-open');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  document.getElementById('canvas').classList.remove('panel-open');
  document.querySelectorAll('.dept-node').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.spoke-line').forEach(l => l.classList.remove('active'));
  currentDept = null;
}

function switchToTab(tabName) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));

  const btn = document.querySelector(`.tab-btn[data-tab="${tabName}"]`);
  const pane = document.getElementById('tab' + tabName.charAt(0).toUpperCase() + tabName.slice(1));
  if (btn) btn.classList.add('active');
  if (pane) {
    pane.classList.add('active');
    if (tabName === 'staff' && currentDept) renderStaff(currentDept);
    if (tabName === 'tasks' && currentDept) renderTasks(currentDept);
  }
}

// Wire tab buttons
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchToTab(btn.getAttribute('data-tab')));
});

  const palette = [dept.color, shiftColor(dept.color, 25), shiftColor(dept.color, -15)];

  const cards = dept.staff.map((p, si) => {
    const initials = p.name.split(' ').filter(w => /[A-Za-z]/.test(w[0])).map(w => w[0]).slice(0, 2).join('').toUpperCase();
    const bg = palette[si % palette.length];
    const statusClass = p.status === 'active' ? 'status-active' : p.status === 'retained' ? 'status-retained' : 'status-vacant';
    const statusText = p.status === 'active' ? 'Active' : p.status === 'retained' ? 'Retain' : 'Vacant';
    const salaryHtml = p.salary ? `<span class="salary-chip">${p.salary}</span>` : '';
    const hireHtml = p.hireTarget ? `<div class="hire-chip">Hire: ${p.hireTarget}</div>` : '';
    const locationHtml = p.location ? `<div style="font-size:10.5px;color:#6366f1;margin-top:2px;">📍 ${p.location}</div>` : '';

    const resps = p.responsibilities.map(r =>
      `<div class="resp-item"><div class="resp-dot" style="background:${dept.color}"></div><div>${r}</div></div>`
    ).join('');

    return `
      <div class="staff-card" id="sc-${dept.id}-${si}">
        <div class="staff-card-header" onclick="toggleCard('${dept.id}',${si})">
          <div class="staff-avatar" style="background:${bg}">${initials}</div>
          <div class="staff-info">
            <div class="staff-name">${p.name}</div>
            <div class="staff-role">${p.role}</div>
            ${salaryHtml}
            ${hireHtml}
            ${locationHtml}
          </div>
          <span class="staff-status ${statusClass}">${statusText}</span>
          <span class="staff-chevron">▼</span>
        </div>
        <div class="staff-responsibilities">
          <div class="resp-inner">${resps}</div>
          <div class="reports-to">Reports to: ${p.reportsTo}</div>
        </div>
      </div>
    `;
  }).join('');

  container.innerHTML = `
    <div class="section-label">${dept.staff.length} Role${dept.staff.length !== 1 ? 's' : ''} — Leadership & Staff</div>
    ${cards}
  `;
}

function toggleCard(deptId, idx) {
  document.getElementById(`sc-${deptId}-${idx}`).classList.toggle('open');
}

// ─── TASKS RENDER ─────────────────────────────────────────────────────────────
function renderTasks(dept) {
  const container = document.getElementById('tabTasks');

  const completedCount = dept.tasks.filter(t => (taskStatuses[`${dept.id}-${t.id}`] || t.status) === 'Completed').length;

  const rows = dept.tasks.map(task => {
    const key = `${dept.id}-${task.id}`;
    if (!taskStatuses[key]) taskStatuses[key] = task.status;
    const status = taskStatuses[key];
    const dotClass = { Pending:'dot-pending', Started:'dot-started', Completed:'dot-completed', Negotiating:'dot-negotiating' }[status] || 'dot-pending';
    const pClass = `p${task.priority}`;
    const pLabel = ['','P1','P2','P3'][task.priority];

    return `
      <div class="task-row">
        <div>
          <div class="task-id">${task.id}</div>
        </div>
        <div class="task-content">
          <div class="task-name">${task.name}</div>
          <div class="task-desc">${task.desc}</div>
          <div class="task-meta-row">
            <span class="task-owner">👤 ${task.owner}</span>
            <span class="task-budget">${task.budget}</span>
          </div>
        </div>
        <div class="task-controls">
          <span class="priority-badge ${pClass}">${pLabel}</span>
          <div class="status-pill" onclick="cycleStatus('${dept.id}','${task.id}',this)" title="Click to update status">
            <div class="status-dot ${dotClass}"></div>
            <span class="status-text">${status}</span>
          </div>
        </div>
      </div>
    `;
  }).join('');

  container.innerHTML = `
    <div class="section-label">${dept.tasks.length} Action Tasks · ${completedCount} Completed · ${dept.tasks.length - completedCount} Remaining</div>
    <div>${rows}</div>
  `;
}

const statusCycle = ['Pending','Started','Completed'];
function cycleStatus(deptId, taskId, el) {
  const key = `${deptId}-${taskId}`;
  const cur = taskStatuses[key] || 'Pending';
  taskStatuses[key] = cur === 'Negotiating' ? 'Started' : statusCycle[(statusCycle.indexOf(cur) + 1) % statusCycle.length];
  if (currentDept && currentDept.id === deptId) renderTasks(currentDept);
}

// ─── COLOR HELPER ────────────────────────────────────────────────────────────
function shiftColor(hex, amt) {
  const n = parseInt(hex.replace('#',''), 16);
  const r = Math.min(255, Math.max(0, (n >> 16) + amt));
  const g = Math.min(255, Math.max(0, ((n >> 8) & 0xff) + amt));
  const b = Math.min(255, Math.max(0, (n & 0xff) + amt));
  return '#' + ((r<<16)|(g<<8)|b).toString(16).padStart(6,'0');
}

// ─── KEYBOARD ────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

// ─── INIT ─────────────────────────────────────────────────────────────────────
buildDiagram();
</script>
