<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORN Group — European HQ</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy:    #1a4fa0;
  --navy-dk: #0f3070;
  --navy-dp: #07112b;
  --white:   #ffffff;
  --off:     #f5f7fb;
  --border:  #e2e8f0;
  --text:    #111827;
  --muted:   #6b7280;
  --col1:    230px;
  --col2:    270px;
  --ease:    cubic-bezier(.4,0,.2,1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body { font-family: 'Sora', sans-serif; background: #e8ecf3; color: var(--text); }

/* ── BACKGROUND — London skyline, faint everywhere ── */
.bg {
  position: fixed; inset: 0; z-index: 0;
  background-image: url('https://images.unsplash.com/photo-1533929736458-ca588d08c8be?w=1920&q=70&auto=format&fit=crop');
  background-size: cover; background-position: center 40%;
  filter: saturate(.65) brightness(.85);
}
.bg-over {
  position: fixed; inset: 0; z-index: 0;
  background: linear-gradient(to right,
    rgba(255,255,255,.72) 0%,
    rgba(255,255,255,.65) var(--col1),
    rgba(255,255,255,.55) calc(var(--col1) + var(--col2)),
    rgba(255,255,255,.35) 100%);
}

/* ── LAYOUT ── */
.layout {
  position: fixed; inset: 0; z-index: 1;
  display: grid;
  grid-template-columns: var(--col1) var(--col2) 1fr;
}

/* ════════════════════════════════════════
   COL 1 — White identity panel
════════════════════════════════════════ */
.col1 {
  background: rgba(255,255,255,.78);
  border-right: 1px solid var(--border);
  box-shadow: 2px 0 16px rgba(0,0,0,.06);
  display: flex; flex-direction: column; align-items: center;
  padding: 28px 16px 20px;
  overflow-y: auto; z-index: 2;
  backdrop-filter: blur(4px);
}
.col1::-webkit-scrollbar { display: none; }

.hub-circle {
  width: 144px; height: 144px; border-radius: 50%;
  background: var(--white);
  border: 3px solid rgba(26,79,160,.25);
  box-shadow: 0 0 0 8px rgba(26,79,160,.06), 0 4px 24px rgba(26,79,160,.2);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 6px; flex-shrink: 0; cursor: pointer;
  transition: transform .2s, box-shadow .2s;
  animation: hubpulse 4s ease-in-out infinite alternate;
}
.hub-circle:hover { transform: scale(1.04); }
@keyframes hubpulse {
  from { box-shadow: 0 0 0 6px rgba(26,79,160,.05), 0 4px 20px rgba(26,79,160,.15); }
  to   { box-shadow: 0 0 0 12px rgba(26,79,160,.1), 0 4px 32px rgba(26,79,160,.3); }
}
.hub-logo { width: 88px; height: 42px; object-fit: contain; display: block; }
.hub-fb { font-size: 22px; font-weight: 900; color: var(--navy-dk); letter-spacing: 1.5px; }
.hub-sublbl {
  font-size: 9px; font-weight: 700; color: var(--navy);
  letter-spacing: .1em; text-transform: uppercase; text-align: center; line-height: 1.4;
}

.identity { margin-top: 18px; text-align: center; width: 100%; }
.id-name  { font-size: 13.5px; font-weight: 700; color: var(--text); }
.id-role  { font-size: 10.5px; color: var(--muted); margin-top: 2px; }

.id-divider { width: 100%; height: 1px; background: var(--border); margin: 16px 0; }

.id-links { display: flex; flex-direction: column; gap: 7px; width: 100%; }
.id-link {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: 9px;
  background: var(--off); border: 1px solid var(--border);
  text-decoration: none; transition: all .15s; cursor: pointer;
}
.id-link:hover { background: #e8edf8; border-color: rgba(26,79,160,.25); }
.id-link-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.id-link-text { font-size: 10.5px; font-weight: 600; color: var(--navy);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.task-board-btn {
  width: 100%; padding: 11px 14px; border-radius: 10px;
  background: linear-gradient(135deg, var(--navy-dk), var(--navy));
  border: none; color: #fff; font-size: 11.5px; font-weight: 700;
  cursor: pointer; font-family: 'Sora', sans-serif;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: opacity .15s, transform .15s;
  box-shadow: 0 4px 14px rgba(26,79,160,.35);
}
.task-board-btn:hover { opacity: .88; transform: translateY(-1px); }
.task-board-btn.on { background: linear-gradient(135deg, #065f46, #047857); }

.col1-stats { margin-top: 16px; width: 100%; display: flex; flex-direction: column; gap: 5px; }
.col1-stat {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 10px; border-radius: 7px; background: var(--off); border: 1px solid var(--border);
}
.col1-stat-l { font-size: 10px; color: var(--muted); }
.col1-stat-v { font-size: 11px; font-weight: 700; color: var(--navy); font-family: 'JetBrains Mono', monospace; }

.col1-plan {
  margin-top: 14px; width: 100%; padding: 10px;
  border-radius: 8px; background: rgba(26,79,160,.06); border: 1px solid rgba(26,79,160,.12);
  font-size: 9.5px; color: var(--muted); line-height: 1.5; text-align: center;
}
.col1-plan strong { color: var(--navy); display: block; font-size: 10px; margin-bottom: 2px; }

/* ════════════════════════════════════════
   COL 2 — Coloured department tabs
════════════════════════════════════════ */
.col2 {
  background: rgba(240,244,250,.72);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden; z-index: 2;
  backdrop-filter: blur(4px);
}
.col2-header {
  padding: 16px 14px 10px; flex-shrink: 0;
  background: rgba(255,255,255,.82); border-bottom: 1px solid var(--border);
}
.col2-title {
  font-size: 9.5px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 8px;
}
.col2-search {
  width: 100%; padding: 7px 11px; border-radius: 8px;
  background: var(--off); border: 1px solid var(--border);
  color: var(--text); font-size: 11px; font-family: 'Sora', sans-serif; outline: none;
}
.col2-search::placeholder { color: #9ca3af; }
.col2-search:focus { border-color: var(--navy); background: #fff; }
.col2-list { flex: 1; overflow-y: auto; padding: 8px 10px 16px; }
.col2-list::-webkit-scrollbar { width: 3px; }
.col2-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.tab-hq {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 10px; margin-bottom: 6px;
  background: linear-gradient(135deg, var(--navy-dk), var(--navy));
  border: 1px solid rgba(26,79,160,.2);
  cursor: pointer; transition: all .15s;
  box-shadow: 0 2px 10px rgba(26,79,160,.2);
}
.tab-hq:hover { transform: translateX(2px); box-shadow: 0 3px 14px rgba(26,79,160,.3); }
.tab-hq.active { box-shadow: 0 3px 16px rgba(26,79,160,.4); outline: 2px solid rgba(26,79,160,.4); }
.tab-hq-icon { font-size: 18px; flex-shrink: 0; }
.tab-hq-name { font-size: 11.5px; font-weight: 700; color: #fff; }
.tab-hq-sub  { font-size: 9.5px; color: rgba(255,255,255,.6); margin-top: 1px; }

.dept-section-lbl {
  font-size: 9px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  color: #9ca3af; padding: 6px 4px 4px; margin-top: 4px;
}

.dept-tab {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 11px; border-radius: 10px; margin-bottom: 4px;
  cursor: pointer; transition: all .18s;
  border: 1.5px solid transparent; background: #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
  position: relative;
}
.dept-tab:hover { transform: translateX(2px); box-shadow: 0 2px 10px rgba(0,0,0,.1); }
.dept-tab.active {
  border-color: var(--col);
  box-shadow: 0 2px 12px rgba(0,0,0,.12);
  background: #fff;
}
.dept-tab.active::before {
  content: ''; position: absolute; left: 0; top: 20%; bottom: 20%;
  width: 3px; border-radius: 0 3px 3px 0; background: var(--col);
}
.dept-color-dot {
  width: 36px; height: 36px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0;
}
.dept-tab-name { font-size: 11.5px; font-weight: 600; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dept-tab-sub  { font-size: 9.5px; color: var(--muted); margin-top: 1px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dept-tab-count {
  font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 12px;
  background: var(--off); color: var(--muted); border: 1px solid var(--border);
  font-family: 'JetBrains Mono', monospace; flex-shrink: 0; white-space: nowrap;
}
.dept-tab-info { flex: 1; min-width: 0; }

/* ════════════════════════════════════════
   COL 3 — White content area
════════════════════════════════════════ */
.col3 { display: flex; flex-direction: column; overflow: hidden; background: transparent; }

.col3-empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px; padding: 40px;
  background: rgba(255,255,255,.88); backdrop-filter: blur(6px);
  margin: 16px; border-radius: 16px; border: 1px solid var(--border);
  box-shadow: 0 2px 16px rgba(0,0,0,.06);
}
.col3-empty-icon { font-size: 48px; opacity: .3; }
.col3-empty-text { font-size: 13px; color: var(--muted); text-align: center; line-height: 1.6; }

.col3-panel { display: flex; flex-direction: column; height: 100%; overflow: hidden;
  padding: 14px 14px 0; gap: 0; }

/* White card wrapper for panel content */
.panel-card {
  background: #fff;
  border-radius: 14px 14px 0 0;
  border: 1px solid var(--border);
  border-bottom: none;
  box-shadow: 0 2px 16px rgba(0,0,0,.07);
  display: flex; flex-direction: column;
  flex: 1; overflow: hidden;
}

.panel-hdr {
  padding: 18px 22px 14px; flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  background: #fff; border-radius: 14px 14px 0 0;
}
.panel-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 10px; border-radius: 20px;
  font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
  color: #fff; margin-bottom: 8px;
}
.panel-title { font-size: 18px; font-weight: 800; color: var(--text); line-height: 1.2; }
.panel-sub   { font-size: 11px; color: var(--muted); margin-top: 3px; }

.panel-tabs {
  display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0;
  background: var(--off);
}
.panel-tab {
  flex: 1; padding: 10px 8px;
  font-size: 10.5px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase;
  color: var(--muted); background: none; border: none; cursor: pointer;
  border-bottom: 2px solid transparent; transition: color .15s, border-color .15s;
  font-family: 'Sora', sans-serif;
}
.panel-tab.on { color: var(--navy); border-bottom-color: var(--accent, var(--navy)); }
.panel-tab:hover:not(.on) { color: var(--text); background: rgba(0,0,0,.02); }

.panel-body { flex: 1; overflow-y: auto; padding: 20px 22px 24px; background: #fff; }
.panel-body::-webkit-scrollbar { width: 4px; }
.panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── HQ CONTENT (white bg) ── */
.hq-stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.hq-stat-card {
  padding: 14px 16px; border-radius: 10px;
  background: linear-gradient(135deg, var(--navy-dk), var(--navy));
  border: none;
}
.hq-stat-n { font-size: 22px; font-weight: 800; color: #fff; }
.hq-stat-l { font-size: 9.5px; color: rgba(255,255,255,.6); margin-top: 3px;
  text-transform: uppercase; letter-spacing: .07em; }

.hq-section-lbl { font-size: 9.5px; font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
.hq-missions { display: flex; flex-direction: column; gap: 8px; }
.hq-mission {
  display: flex; gap: 12px; padding: 12px 14px; border-radius: 10px;
  background: var(--off); border: 1px solid var(--border);
}
.hq-mission-icon  { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
.hq-mission-title { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
.hq-mission-text  { font-size: 11px; color: var(--muted); line-height: 1.5; }

/* ── STAFF CARDS (white bg) ── */
.sec-lbl {
  font-size: 9.5px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 10px;
}
.scard {
  background: #fff; border: 1px solid var(--border); border-radius: 11px;
  margin-bottom: 8px; overflow: hidden;
  box-shadow: 0 1px 6px rgba(0,0,0,.05);
}
.scard-hdr {
  display: flex; align-items: center; gap: 11px;
  padding: 12px 14px; cursor: pointer; transition: background .15s; user-select: none;
}
.scard-hdr:hover { background: var(--off); }
.sav {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.sinfo { flex: 1; min-width: 0; }
.sname { font-size: 12.5px; font-weight: 600; color: var(--text); line-height: 1.2; }
.srole { font-size: 10.5px; color: var(--muted); margin-top: 1px; }
.sloc  { font-size: 10px; color: #6366f1; margin-top: 2px; }
.sbadge { font-size: 9.5px; font-weight: 600; padding: 2px 7px; border-radius: 20px; flex-shrink: 0; }
.b-active { background: #d1fae5; color: #065f46; }
.b-vacant { background: #fef3c7; color: #92400e; }
.b-retain { background: #e0e7ff; color: #3730a3; }
.schev { font-size: 9px; color: var(--muted); transition: transform .25s; flex-shrink: 0; }
.scard.open .schev { transform: rotate(180deg); }
.sal-chip  { font-size: 9px; font-family: 'JetBrains Mono',monospace; color: #059669;
  background: #d1fae5; padding: 1px 6px; border-radius: 3px; display: inline-block; margin-top: 2px; }
.hire-chip { font-size: 9.5px; color: #b45309; font-weight: 500; margin-top: 2px; }
.sresp { max-height: 0; overflow: hidden; transition: max-height .4s var(--ease);
  border-top: 0 solid var(--border); }
.scard.open .sresp { max-height: 800px; border-top-width: 1px; }
.resp-inner { padding: 12px 14px; background: var(--off); }
.ritem { display: flex; gap: 8px; font-size: 11px; color: var(--text);
  line-height: 1.5; margin-bottom: 5px; }
.rdot { width: 4px; height: 4px; border-radius: 50%; margin-top: 7px; flex-shrink: 0; }
.rto { font-size: 10.5px; color: var(--muted); padding: 6px 14px;
  border-top: 1px solid var(--border); background: #fff; }

/* ── TASK ROWS (white bg) ── */
.task-row {
  display: grid; grid-template-columns: 38px 1fr 84px; gap: 8px; align-items: start;
  padding: 13px 0; border-bottom: 1px solid var(--border);
}
.task-row:last-child { border-bottom: none; }
.tid { font-family: 'JetBrains Mono',monospace; font-size: 9px; color: #9ca3af; padding-top: 2px; }
.tname   { font-weight: 600; color: var(--text); font-size: 12px; margin-bottom: 2px; line-height: 1.3; }
.tdesc   { font-size: 10.5px; color: var(--muted); line-height: 1.4; margin-bottom: 4px; }
.tmeta   { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.tsugg   { font-size: 10px; color: var(--muted); }
.tbudget { font-family: 'JetBrains Mono',monospace; font-size: 9.5px; color: #9ca3af; }
.tctrl   { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.pbadge  { font-size: 9.5px; font-weight: 700; padding: 2px 6px; border-radius: 20px; }
.p1 { background: #fee2e2; color: #991b1b; }
.p2 { background: #fef3c7; color: #92400e; }
.p3 { background: #d1fae5; color: #065f46; }
.spill {
  display: flex; align-items: center; gap: 3px; cursor: pointer;
  padding: 2px 7px; border-radius: 20px; border: 1px solid var(--border);
  transition: background .15s; background: #fff;
}
.spill:hover { background: var(--off); }
.sdot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dot-pending     { background: #9ca3af; }
.dot-started     { background: #f59e0b; }
.dot-completed   { background: #10b981; }
.dot-negotiating { background: #6366f1; }
.stxt { font-size: 9px; font-weight: 500; color: var(--muted); white-space: nowrap; }
.owner-row { display: flex; align-items: center; gap: 6px; margin-top: 7px; flex-wrap: wrap; }
.osel {
  flex: 1; min-width: 120px; max-width: 180px; padding: 5px 8px;
  border: 1px solid var(--border); border-radius: 7px;
  font-size: 11px; font-family: 'Sora',sans-serif;
  color: var(--text); background: #fff; cursor: pointer; outline: none;
}
.osel:focus { border-color: var(--navy); }
.ddate {
  padding: 5px 8px; border: 1px solid var(--border); border-radius: 7px;
  font-size: 11px; font-family: 'Sora',sans-serif;
  color: var(--text); background: #fff; cursor: pointer; outline: none; min-width: 116px;
}
.ddate:focus { border-color: var(--navy); }
.sav-btn {
  padding: 5px 13px; border-radius: 7px; border: none;
  background: var(--navy); color: #fff; font-size: 10.5px; font-weight: 700;
  cursor: pointer; font-family: 'Sora',sans-serif; transition: opacity .15s;
}
.sav-btn:hover { opacity: .8; }
.sav-btn.ok { background: #059669; }
.owner-chip {
  display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 600;
  padding: 2px 8px; border-radius: 20px; background: #e0e7ff; color: #3730a3; margin-top: 2px;
}
.due-chip {
  display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 600;
  padding: 2px 8px; border-radius: 20px; margin-top: 2px;
}
.due-chip.ov { background: #fee2e2; color: #991b1b; }
.due-chip.sn { background: #fef3c7; color: #92400e; }
.due-chip.ok { background: #d1fae5; color: #065f46; }

/* ════════════════════════════════════════
   TASK BOARD — clean white overlay
════════════════════════════════════════ */
#taskboard {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(241,245,249,.75);
  backdrop-filter: blur(6px);
  display: none; flex-direction: column; overflow: hidden;
}
#taskboard.open { display: flex; }

.tb-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 28px 14px;
  background: #fff; border-bottom: 1px solid var(--border);
  box-shadow: 0 1px 6px rgba(0,0,0,.06);
  flex-shrink: 0;
}
.tb-ttl { font-size: 17px; font-weight: 800; color: var(--text); }
.tb-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
.tb-x {
  padding: 7px 18px; border-radius: 9px;
  border: 1.5px solid var(--border); background: #fff;
  color: var(--text); font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: 'Sora',sans-serif; transition: all .15s;
}
.tb-x:hover { background: var(--off); border-color: var(--navy); color: var(--navy); }

.tb-filters {
  display: flex; gap: 8px; padding: 10px 28px;
  background: #fff; border-bottom: 1px solid var(--border);
  flex-shrink: 0; flex-wrap: wrap; align-items: center;
}
.tf-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
.tf-btn {
  padding: 4px 13px; border-radius: 20px; border: 1.5px solid var(--border);
  background: #fff; color: var(--muted); font-size: 11px; font-weight: 600;
  cursor: pointer; font-family: 'Sora',sans-serif; transition: all .15s;
}
.tf-btn:hover { border-color: var(--navy); color: var(--navy); background: rgba(26,79,160,.04); }
.tf-btn.on { background: var(--navy); color: #fff; border-color: var(--navy); }

.tb-board {
  flex: 1; overflow-x: auto; overflow-y: hidden;
  display: flex; gap: 14px; padding: 18px 28px 22px;
  background: #f0f4fa;
}
.tb-board::-webkit-scrollbar { height: 5px; }
.tb-board::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.tb-col {
  flex-shrink: 0; width: 290px; display: flex; flex-direction: column;
  background: #fff; border-radius: 14px; border: 1px solid var(--border);
  box-shadow: 0 2px 12px rgba(0,0,0,.06);
  overflow: hidden; max-height: calc(100vh - 140px);
}
.tb-col-h {
  padding: 12px 14px 10px; display: flex; align-items: center;
  justify-content: space-between; flex-shrink: 0;
  border-bottom: 2px solid var(--col-accent, var(--border));
  background: var(--col-bg, var(--off));
}

// ══ BUILD COL2 LIST ══════════════════════════════
function buildDeptList(filter=''){
  const list = document.getElementById('deptList');
  list.innerHTML = '';

  // HQ tab
  if(!filter){
    const hq = document.createElement('div');
    hq.className = 'tab-hq' + (curHQ ? ' active' : '');
    hq.innerHTML = `<div class="tab-hq-icon">🏛️</div><div class="tab-hq-info"><div class="tab-hq-name">ORN Group HQ Overview</div><div class="tab-hq-sub">Strategy, missions & HQ action tasks</div></div>`;
    hq.onclick = openHQ;
    list.appendChild(hq);
    const lbl = document.createElement('div');
    lbl.className = 'dept-section-lbl';
    lbl.textContent = 'Departments';
    list.appendChild(lbl);
  }

  const q = filter.toLowerCase();
  DEPS.forEach(d => {
    if(q && !d.n.toLowerCase().includes(q) && !d.sub.toLowerCase().includes(q)) return;
    const done = d.tasks.filter(t => gs(d.id,t.id,'status',t.st)==='Completed').length;
    const tab = document.createElement('div');
    tab.className = 'dept-tab' + (curDept && curDept.id===d.id ? ' active' : '');
    tab.style.setProperty('--col', d.cl);
    tab.setAttribute('data-id', d.id);
    tab.innerHTML = `
      <div class="dept-color-dot" style="background:${d.cl}22"><span style="font-size:18px">${d.ic}</span></div>
      <div class="dept-tab-info">
        <div class="dept-tab-name">${d.n}</div>
        <div class="dept-tab-sub">${d.sub}</div>
      </div>
      <div class="dept-tab-count">${done}/${d.tasks.length}</div>`;
    tab.onclick = () => openDept(d.id);
    list.appendChild(tab);
  });
}

function filterDepts(v){ buildDeptList(v); }

// ══ PANEL STATE ══════════════════════════════════
let curDept=null, curHQ=false, curTab='staff', boardOpen=false, boardFilter='all';
const tStates={};

function openHQ(){
  curDept=null; curHQ=true;
  buildDeptList(document.getElementById('deptSearch').value);
  showPanel({
    color:'#1a4fa0', badge:'🏛️ European HQ',
    title:'ORN Group — European HQ', sub:HQ.sub, isHQ:true
  });
}

function openDept(id){
  curHQ=false;
  curDept=DEPS.find(d=>d.id===id); if(!curDept) return;
  buildDeptList(document.getElementById('deptSearch').value);
  showPanel({
    color:curDept.cl, badge:curDept.ic+' '+curDept.n,
    title:curDept.n, sub:curDept.sub, isHQ:false,
    accent:curDept.cl
  });
}

function showPanel(cfg){
  document.getElementById('col3Empty').style.display='none';
  document.getElementById('col3Panel').style.display='flex';
  const badge=document.getElementById('panelBadge');
  badge.style.background=cfg.color; badge.textContent=cfg.badge;
  document.getElementById('panelTitle').textContent=cfg.title;
  document.getElementById('panelSub').textContent=cfg.sub;
  document.getElementById('col3Panel').style.setProperty('--accent', cfg.color||'#1a4fa0');

  const tabs=document.getElementById('panelTabs'); tabs.innerHTML='';
  const tl=cfg.isHQ?[['overview','🏛 Overview'],['tasks','✅ Tasks']]:[['staff','👤 Staff'],['tasks','✅ Tasks']];
  tl.forEach(([t,lbl],idx)=>{
    const b=document.createElement('button');
    b.className='panel-tab'+(idx===0?' on':'');
    b.setAttribute('data-t',t); b.textContent=lbl;
    b.onclick=()=>switchTab(t,cfg); tabs.appendChild(b);
  });
  if(cfg.isHQ){renderHQOverview();curTab='overview';}
  else{renderStaff(curDept);curTab='staff';}
}

function switchTab(t,cfg){
  document.querySelectorAll('.panel-tab').forEach(b=>b.classList.toggle('on',b.getAttribute('data-t')===t));
  curTab=t;
  if(t==='overview') renderHQOverview();
  else if(t==='staff'&&curDept) renderStaff(curDept);
  else if(t==='tasks') cfg.isHQ?renderHQTasks():renderTasks(curDept);
}

function renderHQOverview(){
  const pb=document.getElementById('panelBody');
  const st=HQ.stats.map(s=>`<div class="hq-stat-card"><div class="hq-stat-n">${s.n}</div><div class="hq-stat-l">${s.l}</div></div>`).join('');
  const ms=HQ.missions.map(m=>`<div class="hq-mission"><div class="hq-mission-icon">${m.icon}</div><div><div class="hq-mission-title">${m.t}</div><div class="hq-mission-text">${m.d}</div></div></div>`).join('');
  pb.innerHTML=`<div class="hq-stats-grid">${st}</div><div class="hq-section-lbl" style="margin-bottom:10px">What European HQ Manages</div><div class="hq-missions">${ms}</div>`;
}

function renderHQTasks(){
  document.getElementById('panelBody').innerHTML=`<div class="sec-lbl">${HQ.tasks.length} HQ Action Tasks</div>${buildRows('hq',HQ.tasks)}`;
}

function sc(hex,a){const n=parseInt(hex.replace('#',''),16);const r=Math.min(255,Math.max(0,(n>>16)+a));const g=Math.min(255,Math.max(0,((n>>8)&0xff)+a));const b=Math.min(255,Math.max(0,(n&0xff)+a));return'#'+((r<<16)|(g<<8)|b).toString(16).padStart(6,'0')}

function renderStaff(dept){
  const pb=document.getElementById('panelBody');
  const pal=[dept.cl,sc(dept.cl,28),sc(dept.cl,-18)];
  const cards=dept.staff.map((p,si)=>{
    const init=p.nm.split(' ').filter(w=>/[A-Za-z]/.test(w[0])).map(w=>w[0]).slice(0,2).join('').toUpperCase();
    const bCls=p.st==='active'?'b-active':p.st==='retain'?'b-retain':'b-vacant';
    const bTxt=p.st==='active'?'Active':p.st==='retain'?'Retain':'Vacant';
    const sal=p.sl?`<span class="sal-chip">${p.sl}</span>`:'';
    const hire=p.hi?`<div class="hire-chip">Hire target: ${p.hi}</div>`:'';
    const loc=p.lo?`<div class="sloc">📍 ${p.lo}</div>`:'';
    const rs=p.rs.map(r=>`<div class="ritem"><div class="rdot" style="background:${dept.cl}"></div><div>${r}</div></div>`).join('');
    return`<div class="scard" id="sc-${dept.id}-${si}">
      <div class="scard-hdr" onclick="tog('${dept.id}',${si})">
        <div class="sav" style="background:${pal[si%pal.length]}">${init}</div>
        <div class="sinfo"><div class="sname">${p.nm}</div><div class="srole">${p.ro}</div>${sal}${hire}${loc}</div>
        <span class="sbadge ${bCls}">${bTxt}</span><span class="schev">▼</span>
      </div>
      <div class="sresp"><div class="resp-inner">${rs}</div><div class="rto">Reports to: ${p.rt}</div></div>
    </div>`;
  }).join('');
  pb.innerHTML=`<div class="sec-lbl">${dept.staff.length} Roles</div>${cards}`;
}
function tog(did,idx){document.getElementById(`sc-${did}-${idx}`).classList.toggle('open')}

function renderTasks(dept){
  const pb=document.getElementById('panelBody');
  const done=dept.tasks.filter(t=>gs(dept.id,t.id,'status',t.st)==='Completed').length;
  pb.innerHTML=`<div class="sec-lbl">${dept.tasks.length} Tasks · ${done} Completed</div>${buildRows(dept.id,dept.tasks)}`;
}

function buildRows(prefix,tasks){
  return tasks.map(t=>{
    const s=gs(prefix,t.id,'status',null)||tStates[`${prefix}-${t.id}`]||t.st;
    tStates[`${prefix}-${t.id}`]=s;
    const sO=gs(prefix,t.id,'owner',''), sD=gs(prefix,t.id,'due','');
    const dc={Pending:'dot-pending',Started:'dot-started',Completed:'dot-completed',Negotiating:'dot-negotiating'}[s]||'dot-pending';
    const opts=PEOPLE.map(p=>`<option value="${p}" ${sO===p?'selected':''}>${p}</option>`).join('');
    const owCh=sO&&sO!=='— Unassigned —'?`<span class="owner-chip">👤 ${sO}</span>`:'';
    let duCh='';
    if(sD){const df=Math.ceil((new Date(sD)-new Date())/864e5);const cls=df<0?'ov':df<=7?'sn':'ok';const lb=df<0?`Overdue ${Math.abs(df)}d`:df===0?'Due today':`Due ${sD}`;duCh=`<span class="due-chip ${cls}">📅 ${lb}</span>`;}
    return`<div class="task-row">
      <div><div class="tid">${t.id}</div></div>
      <div>
        <div class="tname">${t.n}</div>
        <div class="tdesc">${t.d}</div>
        <div class="tmeta"><span class="tsugg">Suggested: ${t.ow}</span><span class="tbudget">${t.bu}</span></div>
        <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:4px">${owCh}${duCh}</div>
        <div class="owner-row">
          <select class="osel" id="os-${prefix}-${t.id}">${opts}</select>
          <input type="date" class="ddate" id="dd-${prefix}-${t.id}" value="${sD}">
          <button class="sav-btn" onclick="saveOwner('${prefix}','${t.id}')">Save</button>
        </div>
      </div>
      <div class="tctrl">
        <span class="pbadge p${t.pr}">P${t.pr}</span>
        <div class="spill" onclick="cycleS('${prefix}','${t.id}')">
          <div class="sdot ${dc}"></div><span class="stxt">${s}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

const CYCLE=['Pending','Started','Completed'];
function cycleS(p,t){
  const k=`${p}-${t}`;
  const cur=gs(p,t,'status',null)||tStates[k]||'Pending';
  const nxt=cur==='Negotiating'?'Started':CYCLE[(CYCLE.indexOf(cur)+1)%CYCLE.length];
  tStates[k]=nxt; fbSave(p,t,{status:nxt});
  if(p==='hq') renderHQTasks(); else if(curDept) renderTasks(curDept);
  refreshTaskStat();
}
function saveOwner(p,t){
  const sel=document.getElementById(`os-${p}-${t}`), dd=document.getElementById(`dd-${p}-${t}`);
  if(!sel) return;
  fbSave(p,t,{owner:sel.value, due:dd?dd.value:''});
  const btn=dd?dd.nextElementSibling:sel.nextElementSibling;
  if(btn){btn.textContent='✓';btn.classList.add('ok');setTimeout(()=>{btn.textContent='Save';btn.classList.remove('ok');},1600);}
  setTimeout(()=>{if(p==='hq')renderHQTasks();else if(curDept)renderTasks(curDept);},200);
}

function refreshTaskStat(){
  const all=[...HQ.tasks,...DEPS.flatMap(d=>d.tasks)];
  const done=all.filter(t=>{const p=HQ.tasks.includes(t)?'hq':DEPS.find(d=>d.tasks.includes(t))?.id||'';return gs(p,t.id,'status',t.st)==='Completed';}).length;
  document.getElementById('taskStatVal').textContent=`${done}/${all.length}`;
}

// ══ TASK BOARD ══════════════════════════════════
function allTasks(){
  const a=[];
  HQ.tasks.forEach(t=>a.push({...t,prefix:'hq',dn:'HQ Overview',dc:HQ.color}));
  DEPS.forEach(dep=>dep.tasks.forEach(t=>a.push({...t,prefix:dep.id,dn:dep.n,dc:dep.cl})));
  return a;
}
function dueInfo(d){
  if(!d) return{l:'No date',c:'no'};
  const df=Math.ceil((new Date(d)-new Date())/864e5);
  if(df<0) return{l:`Overdue ${Math.abs(df)}d`,c:'ov'};
  if(df===0) return{l:'Due today',c:'sn'};
  if(df<=7) return{l:`In ${df}d`,c:'sn'};
  return{l:d,c:'ok'};
}
function renderBoard(){
  const all=allTasks();
  const filtered=all.filter(t=>{
    const s=gs(t.prefix,t.id,'status',t.st),due=gs(t.prefix,t.id,'due',''),own=gs(t.prefix,t.id,'owner','');
    if(boardFilter==='all') return true;
    if(boardFilter==='Unassigned') return !own||own==='— Unassigned —';
    if(boardFilter==='overdue'){if(!due)return false;return Math.ceil((new Date(due)-new Date())/864e5)<0;}
    return s===boardFilter;
  });
  const tot=all.length,done=all.filter(t=>gs(t.prefix,t.id,'status',t.st)==='Completed').length;
  const asgn=all.filter(t=>{const o=gs(t.prefix,t.id,'owner','');return o&&o!=='— Unassigned —';}).length;
  document.getElementById('tbMeta').textContent=`${tot} tasks · ${done} completed · ${asgn} assigned`;
  const cols={};
  filtered.forEach(t=>{
    const o=gs(t.prefix,t.id,'owner','')||'— Unassigned —';
    const k=o==='— Unassigned —'?'❓ Unassigned':o;
    if(!cols[k])cols[k]=[];cols[k].push(t);
  });
  const keys=Object.keys(cols).sort((a,b)=>a==='❓ Unassigned'?1:b==='❓ Unassigned'?-1:a.localeCompare(b));
  if(!keys.length){document.getElementById('tbBoard').innerHTML=`<div style="color:rgba(255,255,255,.3);padding:40px;width:100%;text-align:center">No tasks match this filter</div>`;return;}
  document.getElementById('tbBoard').innerHTML=keys.map(col=>{
    const tasks=cols[col].sort((a,b)=>{
      const da=gs(a.prefix,a.id,'due',''),db=gs(b.prefix,b.id,'due','');
      if(!da&&!db)return 0;if(!da)return 1;if(!db)return -1;return new Date(da)-new Date(db);
    });
    const cards=tasks.map(t=>{
      const s=gs(t.prefix,t.id,'status',t.st),due=gs(t.prefix,t.id,'due',''),di=dueInfo(due);
      const pbg=t.pr===1?'rgba(220,38,38,.2)':t.pr===2?'rgba(245,158,11,.15)':'rgba(16,185,129,.15)';
      const ptc=t.pr===1?'#fca5a5':t.pr===2?'#fcd34d':'#6ee7b7';
      return`<div class="tb-card">
        <div class="tb-dept" style="color:${t.dc}">${t.dn}</div>
        <div class="tb-name">${t.n}</div>
        <div class="tb-meta2">
          <span class="tb-pb" style="background:${pbg};color:${ptc}">P${t.pr}</span>
          <span class="tb-st s-${s}">${s}</span>
          <span class="tb-due ${di.c}">📅 ${di.l}</span>
        </div>
        <div style="margin-top:4px;font-size:9px;color:rgba(255,255,255,.25)">${t.id} · ${t.bu}</div>
      </div>`;
    }).join('');
    const hc=tasks.length===1?tasks[0].dc:'#1a4fa0';
    const hcLight=tasks.length===1?tasks[0].dc+'18':'#f0f4fa';
    return`<div class="tb-col">
      <div class="tb-col-h" style="--col-accent:${hc};--col-bg:${hcLight};border-bottom:2px solid ${hc}40;background:${hcLight}">
        <div class="tb-col-n">${col}</div><span class="tb-col-c">${tasks.length}</span>
      </div>
      <div class="tb-col-b">${cards}</div>
    </div>`;
  }).join('');
}
function tbF(btn,f){
  document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); boardFilter=f; renderBoard();
}
function toggleBoard(){
  boardOpen=!boardOpen;
  const el=document.getElementById('taskboard'), btn=document.getElementById('tbBtn');
  if(boardOpen){el.classList.add('open');btn.classList.add('on');btn.innerHTML='<span>✕</span> Close Board';renderBoard();}
  else{el.classList.remove('open');btn.classList.remove('on');btn.innerHTML='<span>📋</span> Task Board';}
}

document.addEventListener('keydown',e=>{if(e.key==='Escape'&&boardOpen)toggleBoard();});

// ══ INIT ════════════════════════════════════════
buildDeptList();
fbLoad();
refreshTaskStat();
</script>
</body>
</html>
